<!DOCTYPE html>
<html lang="zh-CN" x-data="zipViewer()" :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - 压缩包预览</title>
    <link rel="icon" type="image/svg+xml" href="/static/icons/zip.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        html, body { height: 100%; margin: 0; }
        #app { height: 100dvh; }

        .tree-view {
            font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.7;
            white-space: pre;
            tab-size: 4;
        }

        /* 搜索高亮 */
        .tree-view mark {
            background-color: #fbbf24;
            color: #1f2937;
            border-radius: 2px;
            padding: 0 1px;
        }
        .dark .tree-view mark {
            background-color: #d97706;
            color: #fefce8;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-200">
<div id="app" class="flex flex-col overflow-hidden">

    <!-- 顶部工具栏 -->
    <nav class="shrink-0 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 z-20">
        <div class="px-4 sm:px-6">
            <div class="flex justify-between h-14 items-center">
                <!-- 左侧: 文件名 + 统计 -->
                <div class="flex items-center space-x-3 min-w-0">
                    <svg class="w-5 h-5 shrink-0 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/>
                    </svg>
                    <h1 class="text-sm font-medium truncate">{{ file_name }}</h1>
                    <span class="hidden sm:inline-flex items-center text-xs text-gray-500 dark:text-gray-400 space-x-2">
                        {% if file_count > 0 %}
                        <span>{{ file_count }} 个文件</span>
                        {% endif %}
                        {% if dir_count > 0 %}
                        <span>· {{ dir_count }} 个目录</span>
                        {% endif %}
                    </span>
                </div>

                <!-- 右侧: 搜索 + 主题 + 关闭 -->
                <div class="flex items-center space-x-1 sm:space-x-2">
                    <!-- 搜索框 -->
                    <div class="relative" x-show="searchOpen" x-cloak x-transition>
                        <input type="text" x-model="searchQuery" x-ref="searchInput"
                               @keydown.escape="searchOpen = false; searchQuery = ''"
                               placeholder="搜索文件..."
                               class="w-40 sm:w-56 text-sm px-3 py-1.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <button @click="searchOpen = false; searchQuery = ''"
                                class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </button>
                    </div>
                    <button @click="searchOpen = true; $nextTick(() => $refs.searchInput.focus())"
                            x-show="!searchOpen"
                            class="p-2 rounded-lg text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
                            title="搜索">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                    </button>

                    <!-- 主题切换 -->
                    <button @click="toggleTheme()"
                            class="p-2 rounded-lg text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
                            title="切换主题">
                        <svg x-show="!darkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                        </svg>
                        <svg x-show="darkMode" x-cloak class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                        </svg>
                    </button>

                    <!-- 关闭 -->
                    <button @click="history.back()"
                            class="p-2 rounded-lg text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
                            title="返回">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 目录树内容 -->
    <div class="flex-1 overflow-auto p-4 sm:p-6">
        <div class="max-w-4xl mx-auto">
            <!-- 搜索匹配计数 -->
            <div x-show="searchQuery.length > 0" x-cloak
                 class="mb-3 text-xs text-gray-500 dark:text-gray-400">
                <span x-text="matchCount"></span> 个匹配项
            </div>

            <!-- 树形视图 -->
            <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm overflow-hidden">
                <div class="p-4 sm:p-6 overflow-x-auto">
                    <div class="tree-view text-gray-700 dark:text-gray-300"
                         x-html="highlightedTree">
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    function zipViewer() {
        const rawTree = {{ tree_text | tojson }};

        return {
            darkMode: localStorage.getItem('darkMode') === 'true',
            searchOpen: false,
            searchQuery: '',
            rawTree: rawTree,
            matchCount: 0,

            get highlightedTree() {
                const q = this.searchQuery.trim();
                // HTML-escape the raw tree text
                let escaped = this.escapeHtml(this.rawTree);
                if (!q) {
                    this.matchCount = 0;
                    return escaped;
                }
                // Highlight matches (case-insensitive)
                const escapedQuery = this.escapeHtml(q);
                const regex = new RegExp(this.escapeRegex(escapedQuery), 'gi');
                let count = 0;
                const result = escaped.replace(regex, (match) => {
                    count++;
                    return `<mark>${match}</mark>`;
                });
                this.matchCount = count;
                return result;
            },

            toggleTheme() {
                this.darkMode = !this.darkMode;
                localStorage.setItem('darkMode', this.darkMode);
            },

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            },

            escapeRegex(str) {
                return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            },
        }
    }
</script>
</body>
</html>
