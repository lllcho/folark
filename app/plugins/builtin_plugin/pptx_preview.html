<!DOCTYPE html>
<html lang="zh-CN" x-data="pptxViewer()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{{ title }} - PPT 预览</title>
    <link rel="icon" type="image/svg+xml" href="/static/icons/pptx.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pptxviewjs/dist/PptxViewJS.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        html, body { height: 100%; margin: 0; }
        #app { height: 100dvh; }

        body {
            background: radial-gradient(circle at top, rgba(59,130,246,.10), transparent 28%),
                        linear-gradient(180deg, #0f172a 0%, #111827 100%);
        }

        /* toolbar glass */
        .toolbar-glass {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        /* sidebar glass */
        .sidebar-glass {
            background: rgba(15,23,42,0.82);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-right: 1px solid rgba(255,255,255,0.06);
        }

        /* bottom bar glass */
        .bottom-glass {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        /* slide shell */
        .slide-shell {
            background: rgba(0,0,0,0.18);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.35);
            overflow: hidden;
        }

        /* custom scrollbar */
        .thumb-scroll::-webkit-scrollbar { width: 4px; }
        .thumb-scroll::-webkit-scrollbar-track { background: transparent; }
        .thumb-scroll::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.15);
            border-radius: 4px;
        }
        .thumb-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

        /* thumbnail active */
        .thumb-item.active {
            border-color: #f97316;
            box-shadow: 0 0 0 2px rgba(249,115,22,0.35);
        }

        .thumb-item {
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            cursor: pointer;
            transition: border-color 0.15s, box-shadow 0.15s;
            overflow: hidden;
        }
        .thumb-item:hover:not(.active) {
            border-color: rgba(255,255,255,0.22);
        }
    </style>
</head>
<body class="text-white">
<div id="app" class="flex flex-col overflow-hidden" x-cloak>

    <!-- 顶部工具栏 -->
    <nav class="shrink-0 toolbar-glass z-30">
        <div class="px-4 sm:px-6">
            <div class="flex justify-between h-13 items-center">
                <!-- 左侧 -->
                <div class="flex items-center space-x-3 min-w-0">
                    <h1 class="text-sm font-medium text-white/90 truncate">{{ file_name }}</h1>
                    <span class="hidden sm:inline text-xs text-white/40 truncate" x-show="slideRatio">
                        <span x-text="slideRatio"></span>
                    </span>
                </div>
                <!-- 右侧 -->
                <div class="flex items-center space-x-1">
                    <span class="hidden sm:inline text-xs text-white/40 mr-2" x-text="Math.round(zoomLevel * 100) + '%'"></span>

                    <!-- 缩略图面板切换 -->
                    <button @click="sidebarOpen = !sidebarOpen"
                            class="p-2 rounded-lg text-white/50 hover:text-white hover:bg-white/10 transition-colors"
                            :class="{ 'text-orange-400': sidebarOpen }"
                            title="缩略图面板">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M4 5a1 1 0 011-1h4a1 1 0 011 1v5a1 1 0 01-1 1H5a1 1 0 01-1-1V5zm0 9a1 1 0 011-1h4a1 1 0 011 1v5a1 1 0 01-1 1H5a1 1 0 01-1-1v-5zm10-9a1 1 0 011-1h4a1 1 0 011 1v14a1 1 0 01-1 1h-4a1 1 0 01-1-1V5z"/>
                        </svg>
                    </button>

                    <!-- 全屏 -->
                    <button @click="toggleFullscreen()"
                            class="p-2 rounded-lg text-white/50 hover:text-white hover:bg-white/10 transition-colors"
                            :title="isFullscreen ? '退出全屏' : '全屏'">
                        <svg x-show="!isFullscreen" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5v-4m0 4h-4m4 0l-5-5"/>
                        </svg>
                        <svg x-show="isFullscreen" x-cloak class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M9 9V4.5M9 9H4.5M9 9L3.75 3.75M15 9h4.5M15 9V4.5M15 9l5.25-5.25M9 15v4.5M9 15H4.5M9 15l-5.25 5.25M15 15h4.5M15 15v4.5M15 15l5.25 5.25"/>
                        </svg>
                    </button>

                </div>
            </div>
        </div>
    </nav>

    <!-- Loading -->
    <div x-show="loading" class="flex-1 flex items-center justify-center">
        <div class="text-center">
            <svg class="animate-spin h-8 w-8 text-orange-400 mx-auto mb-3" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            <p class="text-sm text-white/50">正在加载演示文稿...</p>
        </div>
    </div>

    <!-- Error -->
    <div x-show="error" x-cloak class="flex-1 flex items-center justify-center">
        <div class="text-center px-6">
            <svg class="w-12 h-12 text-red-400 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
            </svg>
            <p class="text-sm text-red-400 mb-4" x-text="error"></p>
            <button @click="retry()"
                    class="px-4 py-2 rounded-lg bg-white/10 hover:bg-white/20 text-sm text-white/80 transition-colors">
                重试
            </button>
        </div>
    </div>

    <!-- 主体区域 -->
    <div x-show="!loading && !error" x-cloak class="flex-1 flex overflow-hidden relative">

        <!-- 左侧缩略图面板 -->
        <aside x-show="sidebarOpen" x-cloak
               x-transition:enter="transition ease-out duration-200"
               x-transition:enter-start="-translate-x-full opacity-0"
               x-transition:enter-end="translate-x-0 opacity-100"
               x-transition:leave="transition ease-in duration-150"
               x-transition:leave-start="translate-x-0 opacity-100"
               x-transition:leave-end="-translate-x-full opacity-0"
               class="shrink-0 w-[200px] lg:w-[240px] sidebar-glass z-10 flex flex-col">
            <div class="px-3 py-2 text-xs text-white/40 font-medium uppercase tracking-wider border-b border-white/5">
                幻灯片
            </div>
            <div class="flex-1 overflow-y-auto thumb-scroll p-3 space-y-3" id="thumb-list">
                <template x-for="(thumb, idx) in thumbnails" :key="idx">
                    <div @click="goToSlide(idx)"
                         class="thumb-item"
                         :class="{ 'active': idx === currentSlide }">
                        <div class="relative">
                            <img :src="thumb" class="w-full block" :alt="'幻灯片 ' + (idx + 1)">
                            <span class="absolute bottom-1 right-1 text-[10px] bg-black/60 text-white/80 px-1.5 py-0.5 rounded"
                                  x-text="idx + 1"></span>
                        </div>
                    </div>
                </template>
                <!-- placeholder while thumbnails generate -->
                <template x-if="thumbnails.length === 0 && totalSlides > 0">
                    <template x-for="i in totalSlides" :key="'ph-'+i">
                        <div class="thumb-item opacity-30">
                            <div class="bg-white/5 aspect-video flex items-center justify-center">
                                <span class="text-[10px] text-white/30" x-text="i"></span>
                            </div>
                        </div>
                    </template>
                </template>
            </div>
        </aside>

        <!-- 右侧主预览区 -->
        <div class="flex-1 flex items-center justify-center p-4 sm:p-8" id="canvas-container">
            <div class="slide-shell" id="slide-shell">
                <canvas id="main-canvas"></canvas>
            </div>
        </div>
    </div>

    <!-- 底部导航栏 -->
    <div x-show="!loading && !error" x-cloak class="shrink-0 bottom-glass z-30">
        <div class="px-4 sm:px-6 py-2">
            <div class="flex items-center justify-center space-x-3">
                <button @click="goToSlide(0)"
                        class="p-1.5 rounded-lg text-white/40 hover:text-white hover:bg-white/10 transition-colors disabled:opacity-20"
                        :disabled="currentSlide === 0" title="首页">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>
                    </svg>
                </button>
                <button @click="prevSlide()"
                        class="p-1.5 rounded-lg text-white/40 hover:text-white hover:bg-white/10 transition-colors disabled:opacity-20"
                        :disabled="currentSlide === 0" title="上一页">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </button>
                <span class="text-sm text-white/60 min-w-[60px] text-center">
                    <span class="text-white/90" x-text="currentSlide + 1"></span>
                    <span class="mx-1">/</span>
                    <span x-text="totalSlides"></span>
                </span>
                <button @click="nextSlide()"
                        class="p-1.5 rounded-lg text-white/40 hover:text-white hover:bg-white/10 transition-colors disabled:opacity-20"
                        :disabled="currentSlide >= totalSlides - 1" title="下一页">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                </button>
                <button @click="goToSlide(totalSlides - 1)"
                        class="p-1.5 rounded-lg text-white/40 hover:text-white hover:bg-white/10 transition-colors disabled:opacity-20"
                        :disabled="currentSlide >= totalSlides - 1" title="末页">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
function pptxViewer() {
    return {
        loading: true,
        error: null,
        viewer: null,
        arrayBuffer: null,

        currentSlide: 0,
        totalSlides: 0,
        slideRatio: '',
        slideWidth: 960,
        slideHeight: 540,
        zoomLevel: 1,

        sidebarOpen: window.innerWidth >= 1024,
        isFullscreen: false,
        thumbnails: [],

        _resizeObserver: null,
        _debounceTimer: null,
        _keyHandler: null,

        async init() {
            await this.$nextTick();

            this._keyHandler = this.handleKey.bind(this);
            document.addEventListener('keydown', this._keyHandler);

            document.addEventListener('fullscreenchange', () => {
                this.isFullscreen = !!document.fullscreenElement;
            });
            document.addEventListener('webkitfullscreenchange', () => {
                this.isFullscreen = !!document.webkitFullscreenElement;
            });

            await this.loadPptx();
        },

        async loadPptx() {
            this.loading = true;
            this.error = null;

            try {
                const response = await fetch("{{ file_url }}");
                if (!response.ok) throw new Error('HTTP ' + response.status);
                this.arrayBuffer = await response.arrayBuffer();

                // Parse slide dimensions from presentation.xml
                await this.parseSlideSize(this.arrayBuffer.slice(0));

                const canvas = document.getElementById('main-canvas');
                this.viewer = new PptxViewJS.PPTXViewer({
                    canvas: canvas,
                    debug: false,
                    enableThumbnails: true,
                    slideSizeMode: 'fit',
                    backgroundColor: '#ffffff',
                });

                this.viewer.on('loadComplete', (data) => {
                    this.totalSlides = data.slideCount || this.viewer.getSlideCount();
                    this.loading = false;
                    this.$nextTick(() => {
                        this.setupResizeObserver();
                        this.fitCanvas();
                        this.renderCurrentSlide();
                        // generate thumbnails async
                        setTimeout(() => this.generateThumbnails(), 200);
                    });
                });

                this.viewer.on('slideChanged', (idx) => {
                    this.currentSlide = idx;
                    this.scrollThumbIntoView(idx);
                });

                this.viewer.on('renderComplete', () => {});

                await this.viewer.loadFile(new Uint8Array(this.arrayBuffer));

            } catch (e) {
                console.error('PPTX loading error:', e);
                this.error = e.message || '演示文稿加载失败';
                this.loading = false;
            }
        },

        async parseSlideSize(buffer) {
            try {
                const zip = await JSZip.loadAsync(buffer);
                const xmlFile = zip.file('ppt/presentation.xml');
                if (!xmlFile) return;
                const xmlText = await xmlFile.async('text');
                const parser = new DOMParser();
                const doc = parser.parseFromString(xmlText, 'application/xml');
                // Try multiple namespace patterns
                let sldSz = doc.querySelector('sldSz');
                if (!sldSz) {
                    const allEls = doc.getElementsByTagName('*');
                    for (let el of allEls) {
                        if (el.localName === 'sldSz') { sldSz = el; break; }
                    }
                }
                if (sldSz) {
                    const cx = parseInt(sldSz.getAttribute('cx') || '0');
                    const cy = parseInt(sldSz.getAttribute('cy') || '0');
                    if (cx > 0 && cy > 0) {
                        // EMU to pixels: 1 inch = 914400 EMU, 96 dpi
                        this.slideWidth = Math.round(cx / 914400 * 96);
                        this.slideHeight = Math.round(cy / 914400 * 96);
                        const gcd = this.gcd(cx, cy);
                        this.slideRatio = (cx / gcd) + ':' + (cy / gcd);
                        // Simplify common ratios
                        const r = cx / cy;
                        if (Math.abs(r - 16/9) < 0.01) this.slideRatio = '16:9';
                        else if (Math.abs(r - 4/3) < 0.01) this.slideRatio = '4:3';
                        else if (Math.abs(r - 16/10) < 0.01) this.slideRatio = '16:10';
                    }
                }
            } catch (e) {
                console.warn('Failed to parse slide size:', e);
            }
        },

        gcd(a, b) { return b === 0 ? a : this.gcd(b, a % b); },

        fitCanvas() {
            const container = document.getElementById('canvas-container');
            const shell = document.getElementById('slide-shell');
            const canvas = document.getElementById('main-canvas');
            if (!container || !canvas) return;

            const cw = container.clientWidth - 32;
            const ch = container.clientHeight - 32;
            const aspect = this.slideWidth / this.slideHeight;

            let w, h;
            if (cw / ch > aspect) {
                h = ch;
                w = h * aspect;
            } else {
                w = cw;
                h = w / aspect;
            }

            w = Math.floor(w);
            h = Math.floor(h);

            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
            canvas.width = Math.round(w * dpr);
            canvas.height = Math.round(h * dpr);

            if (shell) {
                shell.style.width = w + 'px';
                shell.style.height = h + 'px';
            }

            this.zoomLevel = w / this.slideWidth;
        },

        setupResizeObserver() {
            const container = document.getElementById('canvas-container');
            if (!container) return;

            this._resizeObserver = new ResizeObserver(() => {
                clearTimeout(this._debounceTimer);
                this._debounceTimer = setTimeout(() => {
                    this.fitCanvas();
                    this.renderCurrentSlide();
                }, 120);
            });
            this._resizeObserver.observe(container);
        },

        async renderCurrentSlide() {
            if (!this.viewer) return;
            try {
                const canvas = document.getElementById('main-canvas');
                await this.viewer.renderSlide(this.currentSlide, canvas);
            } catch (e) {
                console.warn('Render slide failed:', e);
            }
        },

        async goToSlide(idx) {
            if (!this.viewer || idx < 0 || idx >= this.totalSlides) return;
            this.currentSlide = idx;
            await this.viewer.goToSlide(idx);
            await this.renderCurrentSlide();
            this.scrollThumbIntoView(idx);
        },

        async nextSlide() {
            if (this.currentSlide < this.totalSlides - 1) {
                await this.goToSlide(this.currentSlide + 1);
            }
        },

        async prevSlide() {
            if (this.currentSlide > 0) {
                await this.goToSlide(this.currentSlide - 1);
            }
        },

        scrollThumbIntoView(idx) {
            this.$nextTick(() => {
                const list = document.getElementById('thumb-list');
                if (!list) return;
                const items = list.querySelectorAll('.thumb-item');
                if (items[idx]) {
                    items[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            });
        },

        async generateThumbnails() {
            if (!this.viewer || this.totalSlides === 0) return;
            const thumbWidth = 220;
            const thumbHeight = Math.round(thumbWidth / (this.slideWidth / this.slideHeight));
            const dpr = Math.min(window.devicePixelRatio || 1, 2);

            for (let i = 0; i < this.totalSlides; i++) {
                try {
                    const offCanvas = document.createElement('canvas');
                    offCanvas.width = Math.round(thumbWidth * dpr);
                    offCanvas.height = Math.round(thumbHeight * dpr);
                    offCanvas.style.width = thumbWidth + 'px';
                    offCanvas.style.height = thumbHeight + 'px';

                    await this.viewer.renderSlide(i, offCanvas);
                    const dataUrl = offCanvas.toDataURL('image/png');
                    this.thumbnails.push(dataUrl);
                } catch (e) {
                    console.warn('Thumbnail generation failed for slide', i, e);
                    // Push a placeholder
                    this.thumbnails.push('');
                }
                // Yield to main thread to avoid blocking
                if (i % 3 === 2) {
                    await new Promise(r => setTimeout(r, 50));
                }
            }
        },

        handleKey(e) {
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                this.prevSlide();
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                this.nextSlide();
            } else if (e.key === 'Home') {
                e.preventDefault();
                this.goToSlide(0);
            } else if (e.key === 'End') {
                e.preventDefault();
                this.goToSlide(this.totalSlides - 1);
            } else if (e.key === 'Escape') {
                if (this.isFullscreen) this.exitFullscreen();
            } else if (e.key.toLowerCase() === 'f' || e.key === 'F11') {
                e.preventDefault();
                this.toggleFullscreen();
            }
        },

        async toggleFullscreen() {
            if (this.isFullscreen) {
                await this.exitFullscreen();
            } else {
                await this.enterFullscreen();
            }
        },

        async enterFullscreen() {
            const app = document.getElementById('app');
            try {
                if (app.requestFullscreen) await app.requestFullscreen();
                else if (app.webkitRequestFullscreen) app.webkitRequestFullscreen();
                this.isFullscreen = true;
            } catch (e) {
                console.warn('Fullscreen denied:', e);
            }
        },

        async exitFullscreen() {
            try {
                if (document.fullscreenElement && document.exitFullscreen) await document.exitFullscreen();
                else if (document.webkitFullscreenElement && document.webkitExitFullscreen) document.webkitExitFullscreen();
                this.isFullscreen = false;
            } catch (e) {
                console.warn('Exit fullscreen failed:', e);
            }
        },

        retry() {
            this.error = null;
            this.thumbnails = [];
            this.currentSlide = 0;
            this.totalSlides = 0;
            if (this.viewer) { try { this.viewer.destroy(); } catch(e){} this.viewer = null; }
            this.loadPptx();
        },

        destroy() {
            if (this._resizeObserver) { this._resizeObserver.disconnect(); this._resizeObserver = null; }
            if (this._keyHandler) { document.removeEventListener('keydown', this._keyHandler); this._keyHandler = null; }
            clearTimeout(this._debounceTimer);
            if (this.viewer) { try { this.viewer.destroy(); } catch(e){} this.viewer = null; }
        },
    }
}
</script>
</body>
</html>
