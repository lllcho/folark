<!DOCTYPE html>
<html lang="zh-CN"
      x-data="audioPreview()"
      :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ file_name }} - 预览</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-200">

    <!-- 顶部导航栏 -->
    <nav class="sticky top-0 z-10 bg-white dark:bg-gray-800 shadow-sm border-b border-gray-200 dark:border-gray-700">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-14 items-center">
                <div class="flex items-center space-x-3 min-w-0">
                    <h1 class="text-sm font-medium truncate" :title="'{{ title | e }}'">
                        {{ file_name }}
                    </h1>
                </div>
                <div class="flex items-center space-x-2">
                    <!-- 暗色模式切换 -->
                    <button @click="darkMode = !darkMode"
                            class="p-2 rounded-lg text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                        <svg x-show="darkMode" x-cloak class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                        </svg>
                        <svg x-show="!darkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- 音频容器 -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-8">
            <div class="flex items-center justify-center mb-6">
                <!-- 音频图标 -->
                <svg class="w-24 h-24 text-purple-500 dark:text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                          d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/>
                </svg>
            </div>
            
            <!-- 音频播放器 -->
            <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6">
                <audio 
                    class="w-full"
                    controls
                    preload="metadata"
                    @error="error = true"
                >
                    <source src="{{ audio_url }}" type="{{ audio_type }}">
                    <p class="text-gray-600 dark:text-gray-300 text-center py-4">
                        您的浏览器不支持 HTML5 音频播放，请<a href="{{ audio_url }}" class="text-purple-500 hover:text-purple-600 dark:text-purple-400 dark:hover:text-purple-300 underline">下载音频</a>查看。
                    </p>
                </audio>
            </div>
        </div>

        <!-- 错误提示 -->
        <div x-show="error" x-cloak
             class="mt-4 p-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg">
            <div class="flex items-center space-x-2">
                <svg class="w-5 h-5 text-red-500 dark:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span class="text-sm text-red-700 dark:text-red-300">
                    音频加载失败，请尝试<a href="{{ audio_url }}" class="underline hover:text-red-800 dark:hover:text-red-200">直接下载</a>查看。
                </span>
            </div>
        </div>
    </main>

    <script>
        function audioPreview() {
            return {
                darkMode: localStorage.getItem('darkMode') === 'true',
                error: false,
                init() {
                    this.$watch('darkMode', val => localStorage.setItem('darkMode', val));
                }
            }
        }
    </script>
</body>
</html>
