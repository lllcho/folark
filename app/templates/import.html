{% extends "base.html" %}

{% block title %}folark - 导入文件{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">

    <!-- 页面标题 -->
 
    <!-- 上传区域 -->
    <div x-data="uploadZone" class="mb-8 relative">
        <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-200 mb-3">本地文件上传</h2>
        <!-- Drop Zone -->
        <div @dragover.prevent="isDragging = true"
             @dragleave.prevent="isDragging = false"
             @drop.prevent="handleDrop($event)"
             @click="$refs.fileInput.click()"
             :class="{
                 'border-blue-500 bg-blue-50 dark:bg-blue-900/20': isDragging,
                 'border-gray-300 dark:border-gray-600 hover:border-blue-400 dark:hover:border-blue-500': !isDragging
             }"
             class="relative border-2 border-dashed rounded-lg p-8 text-center cursor-pointer
                    transition-all duration-200 bg-white dark:bg-gray-800">

            <!-- Upload Icon -->
            <div class="mb-4">
                <svg class="mx-auto h-12 w-12 text-gray-400 dark:text-gray-500"
                     :class="{ 'text-blue-500': isDragging }"
                     fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                </svg>
            </div>

            <!-- Upload Text -->
            <p class="text-gray-600 dark:text-gray-400 mb-2">
                <span class="font-medium text-blue-600 dark:text-blue-400">点击上传</span>
                <span>或拖放文件到这里</span>
            </p>
            <p class="text-sm text-gray-500 dark:text-gray-500">
                支持 PDF, DOCX, XLSX, PPTX, EPUB, 纯文本及代码文件, 常见图片格式, 视频, 音频。
            </p>

            <!-- Hidden File Input -->
            <input type="file"
                   x-ref="fileInput"
                   @change="handleFileSelect($event)"
                   accept=".pdf,.docx,.xlsx,.pptx,.epub,.md,.txt,.csv,.json,.xml,.yaml,.yml,.toml,.ini,.conf,.cfg,.log,.rst,.py,.js,.ts,.html,.htm,.css,.java,.c,.cpp,.h,.go,.rs,.sh,.sql,.jpg,.jpeg,.png,.gif,.bmp,.webp,.tiff,.tif,.ico,.svg,.mp4,.mp3,.wav,.flac,.aac,.ogg,.m4a,.zip,.rar,.7z,.tar,.gz,.bz2,.xz"
                   multiple
                   class="hidden">
        </div>

        <!-- Upload Progress List -->
        <template x-if="uploads.length > 0">
            <div class="mt-4 space-y-2">
                <template x-for="upload in uploads" :key="upload.id">
                    <div class="flex items-center gap-3 p-3 bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700">
                        <!-- File Icon -->
                        <div class="flex-shrink-0 w-10 h-10 flex items-center justify-center bg-gray-100 dark:bg-gray-700 rounded">
                            <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            </svg>
                        </div>

                        <!-- File Info & Progress -->
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-medium text-gray-900 dark:text-gray-100 truncate" x-text="upload.name"></p>
                            <div class="flex items-center gap-2">
                                <!-- Progress Bar -->
                                <div class="flex-1 h-1.5 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden"
                                     x-show="upload.status === 'uploading'">
                                    <div class="h-full bg-blue-600 transition-all duration-300 rounded-full"
                                         :style="{ width: upload.progress + '%' }"></div>
                                </div>

                                <!-- Status Text -->
                                <span class="text-xs"
                                      :class="{
                                          'text-blue-600': upload.status === 'uploading',
                                          'text-green-600': upload.status === 'done',
                                          'text-red-600': upload.status === 'failed'
                                      }">
                                    <span x-show="upload.status === 'uploading'" x-text="upload.progress + '%'"></span>
                                    <span x-show="upload.status === 'done'">完成</span>
                                    <span x-show="upload.status === 'failed'" x-text="upload.error || '上传失败'"></span>
                                </span>
                            </div>
                        </div>

                        <!-- Status Icon -->
                        <div class="flex-shrink-0">
                            <!-- Uploading spinner -->
                            <span x-show="upload.status === 'uploading'" class="spinner text-blue-600"></span>
                            <!-- Success check -->
                            <svg x-show="upload.status === 'done'" x-cloak class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                            </svg>
                            <!-- Error icon -->
                            <svg x-show="upload.status === 'failed'" x-cloak class="w-5 h-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </div>
                    </div>
                </template>
            </div>
        </template>
    </div>

    <!-- 分隔线 -->
    <div class="relative mb-8">
        <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-300 dark:border-gray-600"></div>
        </div>
        <div class="relative flex justify-center text-sm">
            <span class="px-3 bg-gray-50 dark:bg-gray-900 text-gray-500 dark:text-gray-400">或</span>
        </div>
    </div>

    <!-- 目录导入 -->
    <div x-data="directoryImport" class="mb-8">
        <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-200 mb-3">服务端目录导入</h2>
        <div class="p-4 bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700">
            <form @submit.prevent="submit()" class="flex flex-col sm:flex-row gap-3">
                <input type="text"
                       x-model="importPath"
                       :disabled="isImporting"
                       placeholder="输入服务端的目录路径，如 /Users/xxx/Documents"
                       class="flex-1 px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg
                              bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100
                              placeholder-gray-500 dark:placeholder-gray-400
                              focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                              disabled:opacity-50">
                <button type="submit"
                        :disabled="isImporting"
                        class="px-4 py-2 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white font-medium rounded-lg
                               transition-colors flex items-center justify-center gap-2 whitespace-nowrap">
                    <span x-text="isImporting ? '导入中...' : '导入目录'"></span>
                    <span x-show="isImporting" class="spinner"></span>
                </button>
            </form>

            <!-- 整体进度条 -->
            <div x-show="isImporting && totalFiles > 0" x-transition class="mt-4">
                <div class="flex justify-between text-sm text-gray-600 dark:text-gray-400 mb-1">
                    <span>正在导入...</span>
                    <span x-text="processedFiles + ' / ' + totalFiles"></span>
                </div>
                <div class="w-full h-2 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                    <div class="h-full bg-blue-600 transition-all duration-300 rounded-full"
                         :style="{ width: (totalFiles > 0 ? Math.round(processedFiles / totalFiles * 100) : 0) + '%' }"></div>
                </div>
            </div>

            <!-- 扫描中提示 -->
            <div x-show="isImporting && totalFiles === 0" x-transition class="mt-4 flex items-center gap-2 text-sm text-gray-500 dark:text-gray-400">
                <span class="spinner text-blue-600"></span>
                <span>正在扫描目录...</span>
            </div>

            <!-- 导入结果 -->
            <div x-show="importResult" x-transition class="mt-3">
                <div :class="importSuccess ? 'bg-green-50 dark:bg-green-900/20 border-green-200 dark:border-green-800 text-green-700 dark:text-green-300' : 'bg-red-50 dark:bg-red-900/20 border-red-200 dark:border-red-800 text-red-700 dark:text-red-300'"
                     class="p-3 rounded-lg border text-sm">
                    <span x-text="importResult"></span>
                </div>
                <a href="/" class="inline-flex items-center gap-1 mt-2 text-sm text-blue-600 dark:text-blue-400 hover:underline">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                    返回首页查看
                </a>
            </div>

            <!-- 错误信息（非SSE错误） -->
            <div x-show="errorMsg && !importResult" x-transition
                 class="mt-3 p-3 rounded-lg border bg-red-50 dark:bg-red-900/20 border-red-200 dark:border-red-800 text-red-700 dark:text-red-300 text-sm"
                 x-text="errorMsg"></div>
        </div>
    </div>

</div>
{% endblock %}
