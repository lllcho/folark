# ── folark Docker 部署 ──────────────────────────────────
# 支持两种启动方式：
#
# 1. 拉取预构建镜像（推荐，需要先有 GitHub Release 发布到 ghcr.io）：
#      docker compose up -d
#
# 2. 从本地 Dockerfile 构建（无需远程镜像，克隆后即可用）：
#      docker compose up -d --build

services:
  folark:
    image: ghcr.io/lllcho/folark:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: folark
    ports:
      - "8890:8890"
    volumes:
      - ./data:/app/data
      # 挂载要管理的文档路径
      # - your_docs_path:/docs
    environment:
      # 登录密码（留空则不启用认证）
      # AUTH_PASSWORD: your_password_here
      # 日志级别: DEBUG / INFO / WARNING / ERROR
      LOG_LEVEL: INFO
      # 单次上传最大大小（字节，默认 500MB）
      # MAX_UPLOAD_SIZE: 524288000
    restart: unless-stopped
